services:
  backend:
    build: ./backend
    ports:
      - "8002:8000"
    environment:
      - LOG_LEVEL=info
      - DEBUG=true
      - DATABASE_URL=sqlite:///./data/app.db
    volumes:
      - ./backend/app:/app/app
      - ./backend/main.py:/app/main.py
      - backend-data:/app/data
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8002
      # Docker 容器间通过服务名通信，backend 内部监听 8000
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  backend-data:

networks:
  app-network:
    driver: bridge