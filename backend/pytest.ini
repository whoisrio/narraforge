[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = manual

# 测试输出格式
addopts =
    --ignore=tests/manual
    --tb=short
    --strict-markers
    --color=yes

# 第三方/框架级 deprecation 由依赖升级单独处理；项目内 warning 继续清理。
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:Using `httpx` with `starlette.testclient` is deprecated:Warning

# 测试标记
markers =
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests
    slow: Slow running tests (requires external dependencies)
    external: Tests that call external services and require explicit opt-in
    db: Tests requiring database
    e2e: End-to-end tests
