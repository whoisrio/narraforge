<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Studio — Cover (Portrait)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f172a;
      overflow: hidden;
    }

    .cover {
      width: 1080px;
      height: 1920px;
      position: relative;
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 35%, #312e81 65%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.3;
      pointer-events: none;
    }
    .orb-1 {
      width: 700px; height: 700px;
      background: #6366f1;
      top: -10%; left: -30%;
      animation: orbFloat1 12s ease-in-out infinite;
    }
    .orb-2 {
      width: 600px; height: 600px;
      background: #f97316;
      bottom: -15%; right: -25%;
      animation: orbFloat2 15s ease-in-out infinite;
    }
    .orb-3 {
      width: 500px; height: 500px;
      background: #818cf8;
      top: 55%; left: -20%;
      animation: orbFloat3 10s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-50px, -40px) scale(1.1); }
    }
    @keyframes orbFloat3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, 50px) scale(1.08); }
    }

    /* Grid pattern overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
      background-size: 100px 100px;
      pointer-events: none;
    }

    /* Waveform decoration — left side */
    .waveform-vertical {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .waveform-vertical.left { left: 10%; }
    .waveform-vertical.right { right: 10%; }

    .wave-bar-v {
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--color-primary), var(--color-primary-light));
      opacity: 0.25;
      animation: wavePulseH 1.6s ease-in-out infinite;
    }
    @keyframes wavePulseH {
      0%, 100% { transform: scaleX(0.2); opacity: 0.12; }
      50% { transform: scaleX(1); opacity: 0.4; }
    }

    /* Horizontal wave divider */
    .wave-divider {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .wave-divider .wave-bar-h {
      width: 6px;
      border-radius: 3px;
      background: linear-gradient(to top, #6366f1, #818cf8);
      opacity: 0.35;
      animation: wavePulse 1.4s ease-in-out infinite;
    }
    @keyframes wavePulse {
      0%, 100% { transform: scaleY(0.3); opacity: 0.15; }
      50% { transform: scaleY(1); opacity: 0.5; }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 56px;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 36px;
      border: 1px solid rgba(129, 140, 248, 0.3);
      border-radius: 9999px;
      background: rgba(129, 140, 248, 0.08);
      backdrop-filter: blur(10px);
      font-size: 20px;
      font-weight: 500;
      color: #a5b4fc;
      letter-spacing: 0.05em;
    }
    .badge-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.5);
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 12px rgba(34, 197, 94, 0.5); }
      50% { box-shadow: 0 0 24px rgba(34, 197, 94, 0.8); }
    }

    /* Title block */
    .title-block { text-align: center; }

    .title {
      font-size: 130px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(180deg, #e0e7ff 0%, #a5b4fc 50%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Divider with waveform */
    .divider-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .divider-line {
      width: 300px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #818cf8, #f97316, #818cf8, transparent);
      border-radius: 1px;
    }

    /* Subtitle */
    .subtitle {
      font-size: 32px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.02em;
      line-height: 1.6;
      max-width: 720px;
    }
    .subtitle em {
      font-style: normal;
      color: #a5b4fc;
      font-weight: 600;
    }

    /* Tech chips — vertical stack */
    .tech-chips {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 480px;
    }
    .chip {
      padding: 22px 36px;
      border-radius: 16px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-align: center;
      border: 1px solid rgba(129, 140, 248, 0.2);
    }
    .chip-1 {
      background: rgba(99, 102, 241, 0.12);
      color: #a5b4fc;
    }
    .chip-2 {
      background: rgba(249, 115, 22, 0.1);
      color: #fb923c;
    }
    .chip-3 {
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
    }

    /* Corner accent lines */
    .corner-line {
      position: absolute;
      pointer-events: none;
    }
    .corner-line::before,
    .corner-line::after {
      content: '';
      position: absolute;
      background: rgba(129, 140, 248, 0.25);
    }

    .corner-tl { top: 100px; left: 100px; }
    .corner-tl::before { width: 100px; height: 1px; top: 0; left: 0; }
    .corner-tl::after { width: 1px; height: 100px; top: 0; left: 0; }

    .corner-br { bottom: 100px; right: 100px; }
    .corner-br::before { width: 100px; height: 1px; bottom: 0; right: 0; }
    .corner-br::after { width: 1px; height: 100px; bottom: 0; right: 0; }
  </style>
</head>
<body>
  <div class="cover">
    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Grid overlay -->
    <div class="grid-overlay"></div>

    <!-- Corner accents -->
    <div class="corner-line corner-tl"></div>
    <div class="corner-line corner-br"></div>

    <!-- Left vertical waveform -->
    <div class="waveform-vertical left">
      <div class="wave-bar-v" style="width: 50px; animation-delay: 0s;"></div>
      <div class="wave-bar-v" style="width: 80px; animation-delay: 0.2s;"></div>
      <div class="wave-bar-v" style="width: 60px; animation-delay: 0.4s;"></div>
      <div class="wave-bar-v" style="width: 90px; animation-delay: 0.6s;"></div>
      <div class="wave-bar-v" style="width: 45px; animation-delay: 0.8s;"></div>
      <div class="wave-bar-v" style="width: 70px; animation-delay: 1.0s;"></div>
      <div class="wave-bar-v" style="width: 85px; animation-delay: 1.2s;"></div>
      <div class="wave-bar-v" style="width: 55px; animation-delay: 1.4s;"></div>
      <div class="wave-bar-v" style="width: 75px; animation-delay: 1.6s;"></div>
      <div class="wave-bar-v" style="width: 65px; animation-delay: 1.8s;"></div>
    </div>

    <!-- Right vertical waveform -->
    <div class="waveform-vertical right">
      <div class="wave-bar-v" style="width: 65px; animation-delay: 0.1s;"></div>
      <div class="wave-bar-v" style="width: 90px; animation-delay: 0.3s;"></div>
      <div class="wave-bar-v" style="width: 50px; animation-delay: 0.5s;"></div>
      <div class="wave-bar-v" style="width: 80px; animation-delay: 0.7s;"></div>
      <div class="wave-bar-v" style="width: 55px; animation-delay: 0.9s;"></div>
      <div class="wave-bar-v" style="width: 75px; animation-delay: 1.1s;"></div>
      <div class="wave-bar-v" style="width: 95px; animation-delay: 1.3s;"></div>
      <div class="wave-bar-v" style="width: 60px; animation-delay: 1.5s;"></div>
      <div class="wave-bar-v" style="width: 70px; animation-delay: 1.7s;"></div>
      <div class="wave-bar-v" style="width: 85px; animation-delay: 1.9s;"></div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="badge">
        <span class="badge-dot"></span>
        AI-Powered Audio Workstation
      </div>

      <div class="title-block">
        <h1 class="title">Voice<br>Studio</h1>
      </div>

      <div class="divider-section">
        <div class="wave-divider">
          <div class="wave-bar-h" style="height: 20px; animation-delay: 0s;"></div>
          <div class="wave-bar-h" style="height: 35px; animation-delay: 0.15s;"></div>
          <div class="wave-bar-h" style="height: 25px; animation-delay: 0.3s;"></div>
          <div class="wave-bar-h" style="height: 40px; animation-delay: 0.45s;"></div>
          <div class="wave-bar-h" style="height: 20px; animation-delay: 0.6s;"></div>
          <div class="wave-bar-h" style="height: 35px; animation-delay: 0.75s;"></div>
          <div class="wave-bar-h" style="height: 40px; animation-delay: 0.9s;"></div>
          <div class="wave-bar-h" style="height: 25px; animation-delay: 1.05s;"></div>
          <div class="wave-bar-h" style="height: 30px; animation-delay: 1.2s;"></div>
          <div class="wave-bar-h" style="height: 20px; animation-delay: 1.35s;"></div>
        </div>
        <div class="divider-line"></div>
      </div>

      <p class="subtitle">
        基于 <em>CosyVoice</em> · <em>Edge-TTS</em> · <em>Faster-Whisper</em><br>
        将文字、声音、字幕融为一体的 AI 音频工作站
      </p>

      <div class="tech-chips">
        <span class="chip chip-1">CosyVoice</span>
        <span class="chip chip-2">Edge-TTS</span>
        <span class="chip chip-3">Faster-Whisper</span>
      </div>
    </div>
  </div>
</body>
</html>
